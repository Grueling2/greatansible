---
- name: Backup and truncate Valheim server log
  hosts: valheim
  become: yes

  vars:
    backup_dir: "/mnt/valheimlogbackups"
    timestamp: "{{ lookup('pipe', 'date +%Y-%m-%d_%H-%M-%S') }}"

  tasks:

    - name: Verify NFS mount exists
      stat:
        path: "{{ backup_dir }}"
      register: mount_check

    - name: Fail if NFS mount is missing
      fail:
        msg: "NFS mount {{ backup_dir }} is not available. Aborting backup."
      when: not mount_check.stat.exists

    - name: Ensure backup directory exists on NFS mount
      file:
        path: "{{ backup_dir }}"
        state: directory

    - name: Copy Valheim log to TrueNAS backup directory
      copy:
        src: "{{ valheim_log_src }}"
        dest: "{{ backup_dir }}/valheim-log-{{ timestamp }}.log"
        remote_src: yes

    - name: Truncate original Valheim log
      copy:
        content: ""
        dest: "{{ valheim_log_src }}"